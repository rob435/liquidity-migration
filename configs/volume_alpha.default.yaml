data_root: ~/SHARED_DATA/bybit_full_pit

exchange:
  name: bybit
  category: linear
  settle_coin: USDT
  testnet: false

trade_flow:
  exclude_block_trades: true
  exclude_rpi_trades: true

universe:
  min_turnover_24h: 2000000.0
  min_age_days: 30
  max_age_days: 0
  rank_start: 1
  rank_end: 120
  max_symbols: 120
  exclude_symbols:
    - BUSDUSDT
    - DAIUSDT
    - FDUSDUSDT
    - FRAXUSDT
    - GUSDUSDT
    - LUSDUSDT
    - PYUSDUSDT
    - SUSDUSDT
    - TUSDUSDT
    - USD1USDT
    - USDCUSDT
    - USDDUSDT
    - USDEUSDT
    - USDPUSDT
    - USTCUSDT
    - USDYUSDT

cost_model:
  maker_fee_bps: 2.0
  taker_fee_bps: 5.5
  maker_adverse_selection_bps: 1.0
  taker_slippage_bps_liquid: 2.0
  # M2 (audit 2026-05-29): the LIVE runner sends Market orders on both legs =
  # 100% taker, so the backtest must cost 100% taker too. A 0.60 maker blend
  # under-costed every fill vs the deployed execution (reconciliation-drift,
  # errors #6/#24). Set to 0.0 to model the deployed reality exactly; base
  # round-trip becomes 2*(taker_fee+taker_slippage)=15 bps. Re-baseline per
  # docs/preregistration/round2/r-audit-methodology-hardening.md.
  maker_fill_probability: 0.0
