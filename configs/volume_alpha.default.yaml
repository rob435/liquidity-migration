data_root: data/volume_alpha

exchange:
  name: bybit
  category: linear
  settle_coin: USDT
  testnet: false

trade_flow:
  exclude_block_trades: true
  exclude_rpi_trades: true

volume_alpha:
  horizons_d: [1, 3, 7]
  quantiles: [0.20, 0.30, 0.50]

volume_backtest:
  score: dollar_volume_rank
  quantile: 0.50
  hold_days: 7
  rebalance_days: 7
  gross_exposure: 1.0
  entry_delay_hours: 1
  stop_mode: fixed
  stop_loss_pct: 0.08
  vol_stop_multiplier: 3.0
  vol_stop_lookback_days: 20
  min_stop_loss_pct: 0.0
  max_stop_loss_pct: 0.0
  take_profit_pct: 0.0
  min_symbols: 4
  cost_multiplier: 1.0
  side_mode: long_high_short_low
  rank_exit_enabled: false
  rank_exit_threshold: 0.50
  universe_rank_min: 1
  universe_rank_max: 0
  universe_min_daily_turnover: 0.0
  include_symbols: []
  exclude_symbols: []

volume_grid:
  scores: [dollar_volume_rank]
  quantiles: [0.30, 0.50]
  hold_days: [3, 7, 14]
  fixed_stop_loss_pcts: [0.0, 0.12, 0.20, 0.30]
  vol_stop_multipliers: [3.0, 4.0]
  rank_exit_modes: [false, true]
  include_reverse_side: false
  take_profit_pcts: [0.0]
  cost_multipliers: [1.0]

daily_close_fade:
  signal_minute: 1380
  top_n: 3
  hold_minutes: 120
  entry_delay_minutes: 1
  score: vol_adjusted_day_return
  pump_filter: all
  min_age_days: 10
  min_day_turnover: 0.0
  min_last_60m_turnover: 0.0
  vol_lookback_days: 20
  gross_exposure: 1.0
  stop_loss_pct: 0.0
  trailing_stop_pct: 0.0
  trailing_activation_pct: 0.01
  stop_delay_minutes: 15
  cost_multiplier: 1.0
  min_symbols: 1
  exclude_symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT]

daily_close_fade_grid:
  signal_minutes: [1320, 1350, 1365, 1380, 1395]
  top_ns: [3, 5, 10]
  hold_minutes: [30, 60, 90, 120, 180]
  scores: [vol_adjusted_day_return, day_return]
  pump_filters: [all, pump, non_pump]
  stop_loss_pcts: [0.0, 0.03, 0.05, 0.08]
  trailing_stop_pcts: [0.0, 0.015, 0.025]
  trailing_activation_pcts: [0.01, 0.02]
  cost_multipliers: [1.0, 2.0, 3.0]

universe:
  min_turnover_24h: 2000000.0
  min_age_days: 30
  max_age_days: 0
  rank_start: 1
  rank_end: 120
  max_symbols: 120
  exclude_symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT]

cost_model:
  maker_fee_bps: 2.0
  taker_fee_bps: 5.5
  maker_adverse_selection_bps: 1.0
  taker_slippage_bps_liquid: 2.0
  maker_fill_probability: 0.60
