  max_trade_notional_pct_baseline_turnovers: [0.005, 0.01]
  market_impact_bps_per_1pct_turnovers: [1.0, 2.0]
  cost_multipliers: [1.0, 2.0, 3.0]

forward_test:
  name: daily-close-fade-paper
  min_turnover_24h: 2000000.0
  max_spread_bps: 80.0
  min_open_interest_value: 0.0
  max_symbols: 0
  workers: 16
  max_entry_lag_minutes: 10
  send_telegram: false

universe:
  min_turnover_24h: 2000000.0
  min_age_days: 30
  max_age_days: 0
