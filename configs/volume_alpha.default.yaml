data_root: data/volume_alpha

exchange:
  name: bybit
  category: linear
  settle_coin: USDT
  testnet: false

trade_flow:
  exclude_block_trades: true
  exclude_rpi_trades: true

volume_alpha:
  horizons_d: [1, 3, 7]
  quantiles: [0.20, 0.30, 0.50]

volume_backtest:
  score: dollar_volume_rank
  start_date: ""
  end_date: ""
  quantile: 0.50
  hold_days: 7
  rebalance_days: 7
  gross_exposure: 1.0
  entry_delay_hours: 1
  stop_mode: fixed
  stop_loss_pct: 0.08
  vol_stop_multiplier: 3.0
  vol_stop_lookback_days: 20
  min_stop_loss_pct: 0.0
  max_stop_loss_pct: 0.0
  take_profit_pct: 0.0
  min_symbols: 4
  cost_multiplier: 1.0
  side_mode: long_high_short_low
  rank_exit_enabled: false
  rank_exit_threshold: 0.50
  universe_rank_min: 1
  universe_rank_max: 0
  universe_min_daily_turnover: 0.0
  include_symbols: []
  exclude_symbols: []

volume_grid:
  scores: [dollar_volume_rank]
  quantiles: [0.30, 0.50]
  hold_days: [3, 7, 14]
  fixed_stop_loss_pcts: [0.0, 0.12, 0.20, 0.30]
  vol_stop_multipliers: [3.0, 4.0]
  rank_exit_modes: [false, true]
  include_reverse_side: false
  take_profit_pcts: [0.0]
  cost_multipliers: [1.0]

# Research candidate only. The 2026-05-08 profit-protection audit invalidated
# the old +16,991.58% headline benchmark. This default now uses corrected
# non-warm-start semantics plus the 2026-05-09 PIT top-50 causal filters.
daily_close_fade:
  signal_minute: 1320
  top_n: 5
  hold_minutes: 180
  entry_delay_minutes: 0
  entry_twap_minutes: 60
  score: context_fade_score
  pump_filter: pump
  min_age_days: 10
  min_day_turnover: 0.0
  min_last_60m_turnover: 0.0
  vol_lookback_days: 20
  liquidity_lookback_days: 7
  liquidity_rank_min: 11
  liquidity_rank_max: 50
  min_baseline_turnover: 0.0
  account_equity: 10000.0
  max_position_weight: 0.0
  max_trade_notional_pct_of_day_turnover: 0.002
  max_trade_notional_pct_of_baseline_turnover: 0.005
  market_impact_bps_per_1pct_turnover: 1.0
  gross_exposure: 1.0
  coin_excess_vs_market_min: 0.08
  coin_vwap_extension_min: 0.035
  coin_vwap_extension_max: 0.15
  coin_late_volume_ratio_min: 1.0
  market_median_day_return_max: 0.0
  organic_move_score_max: 0.0
  manipulation_risk_score_min: 0.0
  squeeze_risk_score_max: 0.0
  require_open_interest_context: true
  require_all_context: true
  position_sizing: score_capped
  score_weight_power: 1.0
  stop_loss_pct: 0.05
  take_profit_pct: 0.02
  basket_stop_loss_pct: 0.0
  trailing_stop_pct: 0.0
  trailing_activation_pct: 0.0
  vol_trailing_stop_mult: 0.0
  vol_trailing_activation_mult: 0.0
  mfe_giveback_activation_pct: 0.01
  mfe_giveback_pct: 0.35
  vwap_reversion_pct: 0.0
  stop_delay_minutes: 0
  profit_protection_delay_minutes: 30
  twap_stop_adding_pct: 0.0
  cost_multiplier: 1.0
  min_symbols: 1
  exclude_symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT]
  require_archive_membership: true

daily_close_fade_grid:
  signal_minutes: [1320]
  top_ns: [3, 5, 10]
  hold_minutes: [30, 60, 90, 120, 180]
  gross_exposures: [1.0]
  scores: [vol_adjusted_day_return, context_fade_score, day_return]
  pump_filters: [all, pump, non_pump]
  stop_loss_pcts: [0.0, 0.03, 0.05, 0.08, 0.20]
  take_profit_pcts: [0.0, 0.02]
  basket_stop_loss_pcts: [0.0]
  trailing_stop_pcts: [0.0, 0.015, 0.025]
  trailing_activation_pcts: [0.01, 0.02]
  vol_trailing_stop_mults: [0.0]
  vol_trailing_activation_mults: [0.0]
  mfe_giveback_activation_pcts: [0.0]
  mfe_giveback_pcts: [0.0, 0.20, 0.35]
  vwap_reversion_pcts: [0.0]
  profit_protection_delay_minutes: [0, 15, 30]
  liquidity_lookback_days: [7]
  liquidity_rank_mins: [11, 31]
  liquidity_rank_maxs: [50]
  min_baseline_turnovers: [0.0]
  coin_vwap_extension_maxs: [0.0, 0.15]
  market_median_day_return_maxs: [0.0, 0.05]
  organic_move_score_maxs: [0.0]
  manipulation_risk_score_mins: [0.0]
  squeeze_risk_score_maxs: [0.0]
  require_open_interest_contexts: [true]
  require_all_contexts: [true]
