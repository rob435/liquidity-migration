name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check liquidity_migration tests
      - name: Run tests
        # Surface every failure as a publicly-visible workflow ::error::
        # annotation. Default annotation just says 'Process completed
        # with exit code 1' which makes triage impossible without admin
        # log download. Also copies log to job summary + artifact.
        run: |
          set +e
          python -m pytest -v --tb=long --no-header 2>&1 | tee /tmp/pytest.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            # Extract failure section + emit each FAILED line as an annotation
            grep -E "^FAILED " /tmp/pytest.log | while read -r line; do
              # GitHub Actions annotation: ::error::message
              # Escape newlines for the workflow command parser.
              echo "::error::$line"
            done
            # Also dump the short summary as a single annotation block.
            SHORT=$(awk '/^=+ short test summary info =+/,EOF' /tmp/pytest.log | head -50)
            if [ -n "$SHORT" ]; then
              # Newlines become %0A in workflow commands.
              ESCAPED=$(printf '%s' "$SHORT" | python3 -c "import sys; print(sys.stdin.read().replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A'))")
              echo "::error title=pytest short summary::${ESCAPED}"
            fi
            # And the job summary copy.
            {
              echo "## pytest failure (exit $STATUS)"
              echo ""
              echo '```'
              tail -400 /tmp/pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $STATUS
      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest.log
          retention-days: 7
