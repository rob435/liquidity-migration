name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check liquidity_migration tests
      - name: Run tests
        # -v + --tb=short surface the failing test name and a short
        # traceback inline in the job log. On failure we ALSO copy the
        # entire pytest output into the job summary so it's visible
        # without admin-level log download access (the annotation
        # default just says "Process completed with exit code 1").
        run: |
          set +e
          python -m pytest -v --tb=short 2>&1 | tee /tmp/pytest.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "## pytest failure (exit $STATUS)"
              echo ""
              echo '```'
              tail -200 /tmp/pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $STATUS
