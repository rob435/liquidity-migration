name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check liquidity_migration tests
      - name: Run tests
        # -v + --tb=long surface every failing test name + traceback
        # inline. On failure we copy the entire log to the job summary
        # AND save it as a downloadable artifact so the failure can be
        # diagnosed without admin-level log download access.
        run: |
          set +e
          python -m pytest -v --tb=long --no-header 2>&1 | tee /tmp/pytest.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "## pytest failure (exit $STATUS)"
              echo ""
              echo '```'
              tail -400 /tmp/pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $STATUS
      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest.log
          retention-days: 7
