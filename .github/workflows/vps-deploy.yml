name: VPS Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vps-deploy.yml"
      - "aggression_carry/**"
      - "deploy/systemd/*.service"
      - "scripts/deploy_vps_live.sh"
      - "scripts/print_vps_recovery_command.sh"
      - "scripts/verify_vps_live.sh"
      - "scripts/vps_console_recover_and_deploy.sh"
      - "scripts/vps_restore_ssh_access.sh"
      - "scripts/vps_rescue_restore_ssh_access.sh"
      - "scripts/wait_for_vps_recovery_and_deploy.sh"
      - "scripts/run_bybit_demo_event_engine.sh"
      - "scripts/run_bybit_demo_ws_risk_engine.sh"
  workflow_dispatch:
    inputs:
      mode:
        description: Run checked deployment or read-only verification.
        required: true
        default: verify
        type: choice
        options:
          - verify
          - deploy
          - wait-deploy
      wait_timeout_seconds:
        description: Seconds to wait for VPS SSH before wait-deploy gives up.
        required: false
        default: "1800"
        type: string
      wait_interval_seconds:
        description: Seconds between VPS SSH probes during wait-deploy.
        required: false
        default: "15"
        type: string

jobs:
  vps:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ vars.VPS_HOST || '204.168.202.167' }}
      VPS_USER: ${{ vars.VPS_USER || 'root' }}
      VPS_ED25519_FINGERPRINT: ${{ vars.VPS_ED25519_FINGERPRINT || 'SHA256:c4K1qg1rx5kH/706qNTdsHYsCDP/o5GIHW1GAHCjwgY' }}
      EXPECTED_TELEGRAM_CHAT_ID: ${{ vars.EXPECTED_TELEGRAM_CHAT_ID || '8388367561' }}
      GITHUB_ACTIONS_DEPLOY_KEY_FINGERPRINT: SHA256:oC3JWnYE9LTto1dHEkdT+puS1n4z1qm2EWjQ+QUEf0s
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          test -n "$VPS_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key

      - name: Verify deploy key fingerprint
        run: |
          ssh-keygen -y -f ~/.ssh/vps_deploy_key > ~/.ssh/vps_deploy_key.pub
          ssh-keygen -lf ~/.ssh/vps_deploy_key.pub -E sha256 | tee ~/.ssh/vps_deploy_key.fingerprint
          grep -F "$GITHUB_ACTIONS_DEPLOY_KEY_FINGERPRINT" ~/.ssh/vps_deploy_key.fingerprint

      - name: Verify VPS host key
        run: |
          ssh-keyscan -T 10 -t ed25519 "$VPS_HOST" > ~/.ssh/known_hosts.tmp
          ssh-keygen -lf ~/.ssh/known_hosts.tmp | grep -F "$VPS_ED25519_FINGERPRINT"
          mv ~/.ssh/known_hosts.tmp ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Checked deploy
        if: github.event_name == 'push' || inputs.mode == 'deploy'
        run: |
          EXPECTED_COMMIT="$GITHUB_SHA" \
          EXPECTED_TELEGRAM_CHAT_ID="$EXPECTED_TELEGRAM_CHAT_ID" \
          SSH_TARGET="$VPS_USER@$VPS_HOST" \
          SSH_OPTS="-i ~/.ssh/vps_deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=10" \
          scripts/deploy_vps_live.sh

      - name: Wait for SSH recovery then deploy
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'wait-deploy'
        run: |
          EXPECTED_COMMIT="$GITHUB_SHA" \
          EXPECTED_TELEGRAM_CHAT_ID="$EXPECTED_TELEGRAM_CHAT_ID" \
          WAIT_TIMEOUT_SECONDS="${{ inputs.wait_timeout_seconds }}" \
          WAIT_INTERVAL_SECONDS="${{ inputs.wait_interval_seconds }}" \
          SSH_TARGET="$VPS_USER@$VPS_HOST" \
          SSH_OPTS="-i ~/.ssh/vps_deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=10" \
          scripts/wait_for_vps_recovery_and_deploy.sh

      - name: Read-only verify
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'verify'
        run: |
          EXPECTED_COMMIT="$GITHUB_SHA" \
          EXPECTED_TELEGRAM_CHAT_ID="$EXPECTED_TELEGRAM_CHAT_ID" \
          SSH_TARGET="$VPS_USER@$VPS_HOST" \
          SSH_OPTS="-i ~/.ssh/vps_deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=10" \
          scripts/verify_vps_live.sh
